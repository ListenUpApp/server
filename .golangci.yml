version: "2"

run:
  modules-download-mode: readonly
  tests: true
  allow-parallel-runners: true

output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true
linters:
  enable:
    - bidichk
    - bodyclose
    - containedctx
    - copyloopvar
    - durationcheck
    - errname
    - errorlint
    - exhaustive
    - fatcontext
    - forcetypeassert
    - goconst
    - gocritic
    - gocyclo
    - godot
    - goprintffuncname
    - gosec
    - intrange
    - makezero
    - misspell
    - nakedret
    - nestif
    - nilerr
    - noctx
    - nolintlint
    - perfsprint
    - predeclared
    - recvcheck
    - revive
    - rowserrcheck
    - sloglint
    - sqlclosecheck
    - staticcheck
    - testifylint
    - thelper
    - unconvert
    - usestdlibvars
    - whitespace
  disable:
    - contextcheck
    - cyclop
    - dupl
    - exhaustruct
    - funlen
    - lll
    - nilnil
    - nlreturn
    - paralleltest
    - prealloc
    - tagliatelle
    - testpackage
    - unparam
    - varnamelen
    - wrapcheck
    - wsl
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (*database/sql.Rows).Close
        - (*database/sql.Tx).Rollback
        - (*github.com/simonhull/audiometa.File).Close
        - (net/http.ResponseWriter).Write
    gocritic:
      disabled-checks:
        - hugeParam
        # rangeValCopy fires on every range-by-value over our domain structs
        # (BookSuggestion, MediaProgress, etc.). Switching to index loops or
        # pointers across all backup/import/handler callsites would be churn
        # without measurable benefit; copies are bounded by import batch size.
        - rangeValCopy
      enabled-tags:
        - diagnostic
        - performance
    gocyclo:
      min-complexity: 15
    gosec:
      excludes:
        - G104   # Duplicate of errcheck
        - G115   # Integer overflow conversion (Go 1.22+ handles safely)
        - G118   # Integer overflow conversion (false positives)
        - G201   # SQL formatting — codebase parameterizes; reviewed manually
        - G202   # SQL string concatenation — same as above
        - G307   # Deferred Close error — false positives on best-effort cleanup
        - G703   # Path traversal — server reads from configured library paths
        - G705   # Log injection via taint — bounded inputs in log statements
    govet:
      disable:
        - shadow
        - fieldalignment
      enable-all: true
    misspell:
      locale: US
    nakedret:
      max-func-lines: 30
    nestif:
      min-complexity: 5
    revive:
      enable-all-rules: false
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: increment-decrement
        - name: var-naming
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: indent-error-flow
        - name: superfluous-else
        - name: unreachable-code
        - name: unused-parameter
        - name: confusing-naming
    staticcheck:
      checks:
        - all
        - -ST1003
  exclusions:
    generated: lax
    rules:
      - linters:
          - contextcheck
          - errcheck
          - goconst
          - gocritic
          - gocyclo
          - gosec
          - govet
          - nestif
          - nilnil
          - noctx
          - nolintlint
          - revive
          - testifylint
          - thelper
          - unparam
        path: _test\.go
      # Exclude staticcheck QF (quickfix suggestions) from tests
      - linters:
          - staticcheck
        path: _test\.go
        text: "QF"
      - path: _test\.go
        text: 'shadow: declaration of "err"'
      - linters:
          - errcheck
          - gocritic
          - gocyclo
          - gosec
          - nestif
          - revive
        path: cmd/(chaptest|dbinspect|seed)/
      # Exclude internal/errors package naming - it's intentionally named that way
      - linters:
          - revive
        path: internal/errors/
        text: "var-naming"
      # Exclude SSE events comment style - they use grouped comments which is clearer
      - linters:
          - revive
        path: internal/sse/events\.go
        text: "exported"
      # Exclude SSE registration comment style
      - linters:
          - revive
        path: internal/sse/registration\.go
        text: "exported"
      # Exclude "api" package name warning - it's intentional
      - linters:
          - revive
        path: internal/api/
        text: "var-naming.*meaningless package"
      # Exclude recvcheck for time_types - mixed receivers are intentional for json marshal/unmarshal
      - linters:
          - recvcheck
        path: internal/api/time_types\.go
      # Exclude nilerr for store iterators - nil return with error is intentional skip behavior
      - linters:
          - nilerr
        path: internal/store/(contributors|series)\.go
      - linters:
          - gocyclo
          - nestif
        path: internal/api/.*(_handlers.*|_analysis|_types)\.go
      - linters:
          - contextcheck
          - gocritic
          - gocyclo
          - nestif
        path: internal/store/
      - linters:
          - gocritic
          - gocyclo
          - nestif
        path: internal/(dto|media|processor|scanner|search|service)/
      - linters:
          - gosec
        text: G101
      - linters:
          - gosec
        text: G304
      - linters:
          - gosec
        text: G301|G306
      - linters:
          - revive
        path: internal/store/
        text: unused-parameter.*ctx
      - linters:
          - revive
        path: internal/search/
        text: stutters
      - linters:
          - revive
        path: internal/service/
        text: unused-parameter.*ctx
      - linters:
          - staticcheck
        text: SA9003
      - linters:
          - staticcheck
        text: SA6002
      - linters:
          - revive
        path: internal/genre/
        text: stutters
      - linters:
          - goconst
        path: internal/store/
      - linters:
          - nestif
        path: cmd/api/main.go
      # Huma generates OpenAPI docs from struct tags; per-field godoc on
      # request/response types is redundant.
      - linters: [revive]
        path: internal/api/.*(_handlers.*|_analysis|_types)\.go
        text: "exported.*should have comment"
      # Store interface (interface.go) is the documented entry point;
      # implementation methods don't each need their own comment.
      - linters: [revive]
        path: internal/store/sqlite/
        text: "exported.*should have comment"
      # The Noop* helper types in internal/store are deliberately minimal
      # placeholders; their methods are obvious from the type name.
      - linters: [revive]
        path: internal/store/
        text: "exported.*Noop.*should have comment"
      # Exhaustive switch on protocol enums is not always desirable when
      # the default case is a documented "unknown / forward-compat" branch.
      - linters: [exhaustive]
        path: internal/(api|service|store|sse|backup|scanner|dto)/
      # backup.BackupX naming is intentional — package "backup" exposes
      # these as the public surface (BackupService, BackupOptions, etc.).
      - linters: [revive]
        path: internal/backup/(types|backup|options)\.go
        text: "stutters"
      # The Service/Restore methods in package "backup" implement an interface
      # that requires a context.Context parameter even when the operation is
      # filesystem-only (List, Get, Delete, Validate). Keeping ctx makes these
      # consistent and preserves the shape if we add cancellation later.
      - linters: [revive]
        path: internal/backup/(backup|restore)\.go
        text: "unused-parameter.*ctx"
      # Test file uses explicit Close + rebind across multiple debug PRAGMA
      # queries; rows.Err checks would obscure the diagnostic flow.
      - linters: [rowserrcheck]
        path: internal/backup/abs/parser_test\.go
      # parser_test.go reuses `rows` across debug queries; the linter prefers
      # defer but explicit Close + rebind is the deliberate pattern here.
      - linters: [sqlclosecheck]
        path: internal/backup/abs/parser_test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: true
  new: false
